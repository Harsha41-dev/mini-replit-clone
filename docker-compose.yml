services:
  mini-replit:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      RUNNER_MODE: ${RUNNER_MODE:-auto}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-secret-before-demo}
    volumes:
      - ./data:/app/data
      # Mount this only when you want the app container to start runner containers.
      # Docker Desktop on Windows/macOS supports this from WSL/Linux-style engines.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
